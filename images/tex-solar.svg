<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" shape-rendering="crispEdges">
  <defs>
    <pattern id="cells" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#14324e"></rect>
      <rect x="0" y="0" width="20" height="20" fill="none" stroke="#0a1a2a" stroke-width="1"></rect>
      <rect x="2" y="2" width="16" height="16" fill="#1d4871"></rect>
      <line x1="10" y1="2" x2="10" y2="18" stroke="#0a1a2a" stroke-width="0.6"></line>
    </pattern>
  </defs>
  
  <g fill="#222">
    <rect x="10" y="50" width="380" height="3"></rect>
    <rect x="10" y="160" width="380" height="3"></rect>
  </g>
  
  <g>
    
    <rect x="20" y="30" width="175" height="75" fill="url(#cells)" stroke="#c9d4dc" stroke-width="2"></rect>
    
    <rect x="205" y="30" width="175" height="75" fill="url(#cells)" stroke="#c9d4dc" stroke-width="2"></rect>
    
    <rect x="20" y="115" width="175" height="75" fill="url(#cells)" stroke="#c9d4dc" stroke-width="2"></rect>
    
    <rect x="205" y="115" width="175" height="75" fill="url(#cells)" stroke="#c9d4dc" stroke-width="2"></rect>
  </g>
  
  <rect x="20" y="30" width="360" height="160" fill="url(#sheen)" opacity="0.08"></rect>
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff"></stop>
      <stop offset="1" stop-color="#000"></stop>
